<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Վերջին Զանգ</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat', sans-serif;
}

body{
  background:#070710;
  color:white;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(255,215,0,0.08), transparent 60%),
    radial-gradient(circle at bottom, rgba(0,140,255,0.08), transparent 60%);
  z-index:-1;
}

.hero{
  height:100vh;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;

  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.88)),
    url("img/6.jpg");

  background-size:cover;
  background-position:center;

  animation: zoom 14s ease-in-out infinite;
}

@keyframes zoom{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.04);}
}

.hero h1{
  font-size:clamp(34px,6vw,70px);
  letter-spacing:3px;
}

.hero p{
  margin-top:6px;
  opacity:0.85;
}

.countdown{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.box{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,215,0,0.3);
  padding:12px 14px;
  border-radius:14px;
  backdrop-filter:blur(10px);
  min-width:65px;
  text-align:center;
}

.box span{
  color:gold;
  font-size:18px;
  font-weight:600;
}

.btn{
  margin-top:25px;
  padding:12px 35px;
  border-radius:30px;
  border:1px solid gold;
  background:transparent;
  color:gold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:gold;
  color:black;
  transform:scale(1.05);
}

section{
  padding:70px 15px;
  text-align:center;
}

h2{
  margin-bottom:25px;
}

.timeline{
  max-width:600px;
  margin:auto;
  position:relative;
}

.timeline::before{
  content:"";
  position:absolute;
  left:18px;
  top:0;
  bottom:0;
  width:2px;
  background:linear-gradient(gold, transparent);
}

.item{
  display:flex;
  gap:15px;
  margin-bottom:30px;
}

.dot{
  width:12px;
  height:12px;
  background:gold;
  border-radius:50%;
  box-shadow:0 0 10px gold;
  margin-top:6px;
}

.content{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
  text-align:left;
  width:100%;
}

.gallery{
  max-width:900px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:18px;
  padding:0 15px;
}

.gallery img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:16px;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.02);
}

.ending{
  padding:120px 15px;
  text-align:center;
}

.ending h1{
  font-size:clamp(26px,5.5vw,52px);
  font-weight:300;
  letter-spacing:3px;

  background:linear-gradient(90deg, gold, white, gold);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

@media(max-width:500px){
  .gallery img{
    height:240px;
  }

  .box{
    min-width:55px;
    padding:10px;
  }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="song" src="song.mp3"></audio>

<!-- HERO -->
<section class="hero">
  <h1>ՎԵՐՋԻՆ ԶԱՆԳ</h1>

  <p>📅 Մայիսի 22 — 09:00</p>

  <div class="countdown">
    <div class="box"><span id="d">0</span><br>Օր</div>
    <div class="box"><span id="h">0</span><br>Ժամ</div>
    <div class="box"><span id="m">0</span><br>Րոպե</div>
    <div class="box"><span id="s">0</span><br>Վրկ</div>
  </div>

  <button class="btn" onclick="scrollToGallery(); playMusic()">ՄԵՆՔ</button>
</section>

<section>
  <h2>ՕՐԱԳՐՈՒՄ</h2>

  <div class="timeline">
    <div class="item">
      <div class="dot"></div>
      <div class="content">
        <b>09:00</b>
        <p>Վերջին զանգ — Դպրոց</p>
      </div>
    </div>

    <div class="item">
      <div class="dot"></div>
      <div class="content">
        <b>17:30</b>
        <p>Ռեստորան «Արարատ»</p>
      </div>
    </div>
  </div>
</section>

<section id="gallery">
  <h2>ԴԱՍԱՐԱՆԻ ՆԿԱՐՆԵՐ</h2>

  <div class="gallery">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
    <img src="5.jpg">
  </div>
</section>

<section class="ending">
  <h1>Սիրով կսպասենք ձեզ</h1>
</section>

<script>

/* countdown */
const target = new Date("2026-05-22T09:00:00").getTime();

function update(){
  const now = Date.now();
  const diff = target - now;

  document.getElementById("d").innerText = Math.floor(diff/86400000);
  document.getElementById("h").innerText = Math.floor(diff%86400000/3600000);
  document.getElementById("m").innerText = Math.floor(diff%3600000/60000);
  document.getElementById("s").innerText = Math.floor(diff%60000/1000);
}
setInterval(update,1000);
update();

/* scroll */
function scrollToGallery(){
  document.getElementById("gallery").scrollIntoView({behavior:"smooth"});
}

/* music */
function playMusic(){
  const song = document.getElementById("song");
  song.play();
}

</script>

</body>
</html>
